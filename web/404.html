<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — האלגוריתם שחזר בתשובה</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Space+Mono:wght@400;700&family=Assistant:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#06080d;color:#ece9e1;font-family:'Assistant',sans-serif}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center}
  .badge{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:#ff9a1f;text-transform:uppercase;direction:ltr;margin-bottom:20px}
  h1{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:clamp(80px,18vw,140px);line-height:1;color:#ece9e1;margin-bottom:0}
  .sub{font-family:'Frank Ruhl Libre',serif;font-size:clamp(22px,4vw,34px);font-weight:700;margin:14px 0 10px;color:#ddd6c7}
  p{color:#9a9182;font-size:16px;line-height:1.6;max-width:420px;margin:0 auto 32px}
  .clippy-bubble{display:inline-flex;align-items:center;gap:10px;background:#fdfbf5;color:#202338;border-radius:14px;padding:12px 18px;font-weight:800;font-size:14px;box-shadow:0 14px 40px rgba(0,0,0,.4);margin-bottom:32px}
  .clippy-icon{width:28px;height:28px;border-radius:9px;background:linear-gradient(145deg,#dbe6ff,#9faed4);display:grid;place-items:center;flex:none}
  .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .btn-primary{background:#ff9a1f;color:#0a0d12;text-decoration:none;font-weight:800;font-size:15px;padding:13px 26px;border-radius:10px;box-shadow:0 8px 24px rgba(255,154,31,.3)}
  .btn-secondary{background:rgba(255,255,255,.06);color:#b3ac9e;text-decoration:none;font-weight:700;font-size:15px;padding:13px 22px;border-radius:10px;border:1px solid rgba(255,255,255,.13)}
  .glow{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);width:400px;height:300px;background:radial-gradient(ellipse,rgba(98,72,220,.18),transparent 70%);pointer-events:none;z-index:0}
</style>
</head>
<body>
<div class="glow"></div>
<div style="position:relative;z-index:1">
  <div class="badge">// error 404</div>
  <h1>404</h1>
  <div class="sub">הדף שחיפשת לא כאן</div>
  <p>גם אלגוריתמים לפעמים מאבדים את הדרך. אבל קליפי תמיד יודע לחזור הביתה.</p>
  <div class="clippy-bubble">
    <div class="clippy-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#27314d"><path d="M18 3a3 3 0 0 1 .75 5.91V19a3 3 0 0 1-6 0v-.18A3 3 0 0 1 9 16V8.91A3 3 0 1 1 12 6a2.99 2.99 0 0 1-.75.41V16a1 1 0 0 0 2 0V6.41A3 3 0 0 1 18 3z"/></svg>
    </div>
    <span>נראה שהקישור לא תקין. נחזור לדף הבית?</span>
  </div>
  <div class="btns">
    <a href="/" class="btn-primary">חזרה לדף הבית</a>
    <a href="https://github.com/DavidPatlas-AI/teshuva-algorithm/issues" target="_blank" rel="noopener" class="btn-secondary">דווח על בעיה</a>
  </div>
</div>
</body>
</html>
