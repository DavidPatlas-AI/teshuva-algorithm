<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080d"/>
      <stop offset="100%" stop-color="#0e1028"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9a1f"/>
      <stop offset="100%" stop-color="#ffca68"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- aurora blobs -->
  <ellipse cx="200" cy="200" rx="280" ry="180" fill="rgba(98,72,220,0.18)" filter="url(#glow)"/>
  <ellipse cx="1000" cy="450" rx="240" ry="160" fill="rgba(8,127,145,0.14)" filter="url(#glow)"/>
  <!-- grid lines subtle -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- badge -->
  <rect x="80" y="70" width="200" height="32" rx="16" fill="rgba(255,154,31,0.15)" stroke="rgba(255,154,31,0.4)" stroke-width="1.5"/>
  <circle cx="100" cy="86" r="5" fill="#4ade80"/>
  <text x="116" y="91" font-family="monospace" font-size="12" fill="#ff9a1f" letter-spacing="1">v0.4 beta · open source</text>
  <!-- main headline RTL -->
  <text x="1120" y="190" font-family="serif" font-size="72" font-weight="900" fill="white" text-anchor="end" direction="rtl">האלגוריתם שחזר</text>
  <text x="1120" y="275" font-family="serif" font-size="72" font-weight="900" fill="white" text-anchor="end" direction="rtl">בתשובה</text>
  <!-- accent line -->
  <text x="1120" y="345" font-family="serif" font-size="36" font-weight="700" fill="url(#acc)" text-anchor="end" direction="rtl" font-style="italic">תן לו לעבוד בשבילך.</text>
  <!-- sub -->
  <text x="1120" y="410" font-family="sans-serif" font-size="22" fill="rgba(200,190,175,0.85)" text-anchor="end" direction="rtl">מסביר למה הפיד שלך מציג מה שהוא מציג.</text>
  <text x="1120" y="445" font-family="sans-serif" font-size="22" fill="rgba(200,190,175,0.6)" text-anchor="end" direction="rtl">Chrome Extension · Desktop · קוד פתוח</text>
  <!-- platform icons row -->
  <!-- windows squares -->
  <rect x="80" y="480" width="22" height="22" rx="3" fill="#F25022"/>
  <rect x="106" y="480" width="22" height="22" rx="3" fill="#7FBA00"/>
  <rect x="80" y="506" width="22" height="22" rx="3" fill="#00A4EF"/>
  <rect x="106" y="506" width="22" height="22" rx="3" fill="#FFB900"/>
  <text x="142" y="498" font-family="monospace" font-size="14" fill="rgba(200,190,175,0.7)">Windows · זמין</text>
  <!-- chrome circle -->
  <circle cx="290" cy="497" r="14" fill="#4285F4"/>
  <circle cx="290" cy="497" r="5" fill="white"/>
  <text x="314" y="503" font-family="monospace" font-size="14" fill="rgba(200,190,175,0.5)">Chrome · זמין</text>
  <!-- URL -->
  <text x="600" y="580" font-family="monospace" font-size="14" fill="rgba(200,190,175,0.35)" text-anchor="middle">teshuva-algorithm.netlify.app</text>
  <!-- clippy bubble bottom right -->
  <rect x="900" y="460" width="220" height="90" rx="14" fill="rgba(253,251,245,0.96)"/>
  <text x="1010" y="493" font-family="monospace" font-size="10" fill="#087f91" text-anchor="middle">CLIPPY // URL SCAN</text>
  <text x="1010" y="515" font-family="sans-serif" font-size="13" fill="#202338" text-anchor="middle" direction="rtl">צפית ב-12 סרטונים דומים</text>
  <text x="1010" y="534" font-family="sans-serif" font-size="12" fill="#6b7280" text-anchor="middle" direction="rtl">האלגוריתם מדרג אותך כמשתמש טכנולוגי</text>
</svg>
